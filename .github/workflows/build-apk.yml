name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses & install components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;33.0.2" "platforms;android-34" --sdk_root="$ANDROID_HOME" || true
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/build-tools/"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore dominex.keystore -alias dominex \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex,OU=Game,O=Dominex,L=IN,S=IN,C=IN" \
            -storepass DominexGame2026 -keypass DominexGame2026 2>/dev/null || true

      - name: Build APK
        working-directory: android
        run: |
          # Create local.properties with SDK path
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "Created local.properties: $(cat local.properties)"
          
          # Download & use Gradle 7.6 directly
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export GRADLE_HOME=/opt/gradle/gradle-7.6
          export PATH=$GRADLE_HOME/bin:$PATH
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          
          gradle --version
          gradle assembleRelease --no-daemon -x lint --info 2>&1 | tail -60

      - name: Find & sign APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "NO APK FOUND"; exit 1; fi
          echo "APK: $APK ($(du -h $APK | cut -f1))"
          
          # Find apksigner
          SIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort | tail -1)
          echo "Signer: $SIGNER"
          
          "$SIGNER" sign \
            --ks dominex.keystore --ks-key-alias dominex \
            --ks-pass pass:DominexGame2026 --key-pass pass:DominexGame2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit signed APK
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add public/dominex-arena.apk
          git diff --staged --quiet || git commit -m "ci: signed APK v2.1 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error