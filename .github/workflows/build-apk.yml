name: Build Dominex Arena APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore dominex.keystore -alias dominex \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -dname "CN=Dominex Arena,OU=Game,O=Dominex,L=IN,S=IN,C=IN" \
            -storepass DominexGame2026 -keypass DominexGame2026 2>/dev/null || true

      - name: Build APK with Gradle
        working-directory: android
        run: |
          # Download Gradle 7.6
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export GRADLE_HOME=/opt/gradle/gradle-7.6
          export PATH=$GRADLE_HOME/bin:$PATH
          gradle --version
          gradle assembleRelease --no-daemon -x lint --stacktrace

      - name: Sign APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK: $APK"
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
            --ks dominex.keystore --ks-key-alias dominex \
            --ks-pass pass:DominexGame2026 --key-pass pass:DominexGame2026 \
            --out public/dominex-arena.apk "$APK"
          ls -lh public/dominex-arena.apk

      - name: Commit APK
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add public/dominex-arena.apk
          git diff --staged --quiet || git commit -m "ci: update APK [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dominex-arena-apk
          path: public/dominex-arena.apk
          if-no-files-found: error