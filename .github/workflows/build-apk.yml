name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger button on GitHub

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Sync latest game files to Android assets
        run: |
          cp public/game/game.js    android/app/src/main/assets/game.js
          cp public/game/index.html android/app/src/main/assets/index.html
          cp public/game/bg_*.png   android/app/src/main/assets/ 2>/dev/null || true
          echo "Assets synced!"
          ls -lh android/app/src/main/assets/game.js

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ailurix-Arena-APK
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Show APK info
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK: $APK"
          ls -lh "$APK"